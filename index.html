<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Invoices">
<meta name="theme-color" content="#f6f7f8">
<title>Invoices — Tax Office of Ricardo Rivera</title>
<style>
:root {
  --ink: #1a2530;
  --sub: #5a6570;
  --faint: #8a929a;
  --line: #e3e6e9;
  --band: #f0f2f4;
  --bg: #f6f7f8;
  --accent: #1f3a5f;      /* deep ledger blue */
  --danger: #a13030;
  --radius: 10px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  color: var(--ink);
  -webkit-text-size-adjust: 100%;
}
.app { max-width: 760px; margin: 0 auto; padding-bottom: 60px; }

.topbar {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  background: rgba(246,247,248,.92); backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line);
}
.brand-name { font-family: Georgia, "Times New Roman", serif; font-size: 22px; font-weight: 700; }
.brand-sub { font-size: 12px; color: var(--faint); }
.topbar-title { font-weight: 600; font-size: 15px; }
.topbar-actions { display: flex; gap: 8px; }

.page { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

.btn {
  appearance: none; border: 1px solid var(--line); background: #fff;
  color: var(--ink); border-radius: var(--radius);
  padding: 10px 14px; font-size: 15px; font-weight: 600; cursor: pointer;
}
.btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn.danger { background: #fff; border-color: #e8caca; color: var(--danger); }
.btn.dashed { border-style: dashed; color: var(--sub); font-weight: 500; }
.btn.block, .btn.primary.block, .btn.danger.block, .btn.dashed.block { display: block; width: 100%; }
.btn:disabled { opacity: .45; }
.btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

.empty { color: var(--sub); text-align: center; padding: 40px 20px; line-height: 1.5; }

.cards { display: flex; flex-direction: column; gap: 10px; }
.card {
  text-align: left; background: #fff; border: 1px solid var(--line);
  border-radius: var(--radius); padding: 14px; cursor: pointer; width: 100%;
  font: inherit; color: inherit;
}
.card-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.card-number { font-weight: 700; letter-spacing: .02em; }
.card-client { margin: 6px 0; color: var(--sub); }
.card-row.muted { color: var(--faint); font-size: 13px; }
.card-amt { font-weight: 700; color: var(--ink); font-size: 15px; }

.pill {
  font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  padding: 3px 9px; border-radius: 99px; border: 1px solid var(--line);
  background: var(--band); color: var(--sub); font-weight: 700;
}
.pill.paid { background: #e7f2e9; color: #2c6e3f; border-color: #cfe5d4; }
.pill.sent { background: #e9eef7; color: #2f4d7a; border-color: #d4deee; }
.pill.pick { font: inherit; font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; padding: 7px 16px; }
.pill.pick.on { outline: 2px solid var(--accent); }
.statusbar { display: flex; gap: 8px; }

.panel {
  background: #fff; border: 1px solid var(--line); border-radius: var(--radius);
  padding: 14px 14px 16px;
}
.panel h2 {
  margin: 0 0 12px; font-size: 12px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--faint); font-weight: 700;
}
.field { display: block; margin-bottom: 12px; }
.field-label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 5px; }
input, textarea {
  width: 100%; font: inherit; font-size: 16px; color: var(--ink);
  border: 1px solid var(--line); border-radius: 8px; padding: 10px;
  background: #fff;
}
input:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 0; border-color: var(--accent); }
textarea { resize: vertical; }
.mono { font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
.check { display: flex; align-items: center; gap: 10px; font-size: 15px; margin: 8px 0; }
.check input { width: auto; }
.hint { font-size: 13px; color: var(--faint); margin: 6px 0 0; line-height: 1.45; }

.item { border-top: 1px solid var(--line); padding-top: 12px; margin-top: 12px; }
.item:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
.item-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
.item-date { max-width: 180px; }
.item-del {
  border: 0; background: transparent; color: var(--faint); font-size: 16px;
  padding: 8px 10px; cursor: pointer;
}
.item textarea { margin-bottom: 8px; }
/* stacked numbers: two inputs side by side, amount on its own row below */
.item-nums { display: flex; gap: 10px; }
.item-nums .field { flex: 1; margin-bottom: 8px; }
.presets { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.chip {
  font: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--line); background: #fff; border-radius: 99px; padding: 6px 12px;
}
.chip.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.item-amount { text-align: right; color: var(--sub); font-size: 14px; }

.trow { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; color: var(--sub); }
.trow span:last-child, .trow b { color: var(--ink); }
.trow.input input { width: 90px; text-align: right; }
.trow.rule-thin { border-top: 1px solid var(--ink); font-weight: 700; color: var(--ink); }
.trow.rule-thick { border-top: 3px solid var(--ink); }
.trow.total span { font-weight: 700; }
.trow.balance { font-weight: 700; font-size: 17px; color: var(--ink); }
.trow.balance input { width: 130px; text-align: right; font-weight: 700; }

.actions { display: flex; flex-direction: column; gap: 10px; }
.row-btns { display: flex; gap: 10px; margin-bottom: 10px; }

.toast {
  position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%);
  background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 99px;
  font-size: 14px; z-index: 20; max-width: 90vw; text-align: center;
}

/* ---------- The invoice sheet (law-firm letterhead, airy) ---------- */
.preview-page { align-items: stretch; }
.preview-actions { display: flex; gap: 10px; }
.sheet {
  background: #fff; border: 1px solid var(--line); border-radius: 4px;
  padding: 34px 26px 30px; line-height: 1.5;
}
.sheet-head { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 30px; flex-wrap: wrap; }
.lh-name { font-family: Georgia, "Times New Roman", serif; font-size: 21px; font-weight: 700; margin-bottom: 8px; }
.lh-lines { font-size: 12.5px; color: var(--sub); }
.lh-invoice {
  font-family: Georgia, "Times New Roman", serif; font-size: 27px;
  letter-spacing: .12em; text-align: right; margin-bottom: 10px;
}
.sheet-meta table { border-collapse: collapse; margin-left: auto; }
.sheet-meta td { font-size: 12.5px; padding: 2px 0 2px 18px; text-align: right; }
.sheet-meta td:first-child { color: var(--faint); }

.bar {
  background: var(--band); color: var(--sub); font-size: 10.5px; font-weight: 700;
  letter-spacing: .2em; padding: 6px 10px; border-radius: 2px;
}
.billto { padding: 12px 2px 4px; font-size: 13px; color: var(--sub); margin-bottom: 22px; }
.billto-name { font-weight: 700; color: var(--ink); font-size: 14.5px; margin-bottom: 2px; }

table.items { width: 100%; border-collapse: collapse; margin-bottom: 26px; }
table.items th {
  background: var(--band); color: var(--sub); font-size: 10.5px; letter-spacing: .12em;
  font-weight: 700; text-align: left; padding: 7px 10px;
}
table.items th.r, table.items td.r { text-align: right; }
table.items td { font-size: 13px; padding: 11px 10px; border-bottom: 1px solid #eceef0; vertical-align: top; }
table.items .c-date { white-space: nowrap; width: 92px; }
.muted { color: var(--faint); }

.totals { max-width: 300px; margin-left: auto; margin-bottom: 26px; }
.totals .trow { padding: 6px 0; font-size: 13.5px; }
.totals .trow.balance { font-size: 16px; }
.sheet-notes {
  border-top: 1px solid #eceef0; padding-top: 12px;
  font-size: 12px; color: var(--faint);
}

/* ---------- Print: only the sheet, full page ---------- */
@media print {
  body { background: #fff; }
  .topbar, .no-print, .toast { display: none !important; }
  .app { max-width: none; padding: 0; }
  .page { padding: 0; }
  .sheet { border: 0; border-radius: 0; padding: 0; }
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}

</style>
</head>
